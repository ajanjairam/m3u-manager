version: "2"
sql:
  - engine: "sqlite"
    queries: "queries"
    schema: "../migrations"
    gen:
      go:
        package: "repository"
        out: "../../internal/repository"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - column: "playlist.active"
            go_type: "bool"
          - column: "channel.active"
            go_type: "bool"
          - column: "cgroup.active"
            go_type: "bool"
          - column: "filter.active"
            go_type: "bool"